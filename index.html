<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Weather Dashboard</title>\n    <link rel="stylesheet" href="style.css">\n</head>\n<body>\n    <div class="weather-dashboard">\n        <h1>Weather Dashboard</h1>\n        <div class="location-input">\n            <input type="text" id="location" placeholder="Enter location">\n            <button id="search">Search</button>\n        </div>\n        <div class="weather-info">\n            <div class="temperature">Temperature: <span id="temp"></span>&#8451;</div>\n            <div class="condition">Condition: <span id="condition"></span></div>\n        </div>\n    </div>\n    <div class="timezone-clock">\n        <h2>Multi-Timezone Clock</h2>\n        <div id="clocks">\n            <div class="clock">UTC: <span id="utc-clock"></span></div>\n            <div class="clock">EST: <span id="est-clock"></span></div>\n            <div class="clock">PST: <span id="pst-clock"></span></div>\n        </div>\n    </div>\n    <script src="script.js"></script>\n</body>\n</html>
